version: 2

updates:
  # GitHub Actions in workflow files. Bumps action versions when upstream
  # ships a new release. Weekly cadence — actions don't move that fast,
  # daily would be noise.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: actions
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
