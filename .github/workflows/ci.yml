name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint + scripts + agent structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prettier — markdown formatting check
        run: npx --yes prettier@latest --check '**/*.md'

      - name: ShellCheck — bash script linter
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: bin
          format: gcc

      - name: bash -n — syntax check on every script
        run: |
          set -e
          for script in bin/*.sh bin/test/*.sh; do
            [ -f "$script" ] || continue
            bash -n "$script"
          done

      - name: Agent file structure
        run: bin/test/markers_test.sh

      - name: install / diff / check / update smoke
        run: bin/test/install_smoke_test.sh
